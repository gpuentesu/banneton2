# =============================================================
# docker-compose.prod.yml — Banneton · Producción
# Build completo, sin volúmenes de código
# =============================================================

services:
  # ─────────────────────────────────────────
  # Aplicación Next.js
  # ─────────────────────────────────────────
  app:
    build: .
    container_name: banneton_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    # Sincroniza el esquema en la BD (crea las tablas) y luego arranca el server.
    command: sh -c "npx prisma db push --skip-generate && pnpm start"
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Base de datos PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: banneton_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: banneton
    volumes:
      - banneton_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  banneton_pgdata:
    name: banneton_pgdata
